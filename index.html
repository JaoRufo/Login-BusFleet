<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="img/Ativo 7.png" type="image/x-icon">
    <title>Login BusFleet</title>
    <link rel="stylesheet" href="css/login.css">
  </head>
  <body>
    <div class="container">
        <div class="navbar-container">
          <nav>
            <a href="#">
              <img src="img/Ativo 9.png" alt="logo_NavBar" class="logo-navbar" />
            </a>
            <ul class="navbar-items">
              <li>
                <a href="#">Inicio</a>
              </li>
              <li>
                <a href="#">Produtos</a>
              </li>
              <li>
                <a href="#">Clientes</a>
              </li>
              <li>
                <a href="#">Recursos</a>
              </li>
              <li>
                <a href="#" id="demonstration">Demonstração</a>
              </li>
              <li>
                <a href="#" id="start-now">Inicie agora</a>
              </li>
              <li>
                <a href="#" class="default-btn">Login</a>
              </li>
            </ul>
          </nav>
        </div>
    <main>
      <div id="main-banner">
        <div id="banner-container">
          <img src="img/Ativo 9.png" id="logo-left" />
        </div>
        <div id="form-container">
          <div id="form-box">
            <div id="refresh-container">
            <p id="refresh-text">EMPRESA</p>
            <img id="refresh" src="img/refresh.svg" alt="refresh" />
            </div>
            <form id="login-form">
              <h3>CNPJ</h3>
              <input
                type="text"
                name="username"
                id="username"
                placeholder="00.000.000/0000-00"
                required
              />
              <h3>Senha</h3>
              <input
                type="password"
                name="password"
                id="password"
                placeholder="*********"
                required
              />
              <input type="submit" value="Entrar" id="submit" />
            </form>
            <div id="forgot-pass">
              <a href="#">Esqueceu a senha?</a>
            </div>
            <div id="register-container">
              <a href="#"><u>Criar conta</a>
            </div>
            <div id="get-app-container">
              <a href="#">
                <img src="img/gplay_btn.png" alt="Google Play" />
              </a>
              <a href="#">
                <img src="img/apple_btn.png" alt="App Store" />
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer><p id="copyright">&copy; 2025 BusFleet</p></footer>
  </body>
</html>
